name: Update Game Leaderboard
 
on:
  issues:
    types: [opened]
 
jobs:
  update-csv:
    if: contains(github.event.issue.title, 'Score Submission')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
 
      - name: Parse Issue Body and Update CSV
        run: |
          # Extract the payload line from the issue description
          DATA_LINE=$(echo "${{ github.event.issue.body }}" | grep "DATA:")
          # Strip the prefix to get raw CSV values: Player,Score,Time
          VALUES=$(echo "$DATA_LINE" | sed 's/DATA://g')
          # Append to our leaderboard file
          echo "$VALUES" >> leaderboard.csv
          # Sort the leaderboard by score descending (ignoring header)
          header=$(head -n 1 leaderboard.csv)
          tail -n +2 leaderboard.csv | sort -t',' -k2 -nr > temp.csv
          echo "$header" > leaderboard.csv
          cat temp.csv >> leaderboard.csv
          rm temp.csv
 
      - name: Commit and Push Changes
        run: |
          git config --global user.name "Leaderboard Bot"
          git config --global user.email "bot@github.com"
          git add leaderboard.csv
          git commit -m "Update leaderboard from Issue #${{ github.event.issue.number }}"
          git push
 
      - name: Close Issue Automatically
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: "Score successfully added to the leaderboard!"
